openapi: 3.0.3
info:
  title: Vimic2 API
  description: |
    Vimic2 is a comprehensive VM-based CI/CD orchestration system with ephemeral build environments.
    
    ## Features
    - **Ephemeral Build Environments**: Isolated VMs per pipeline using QEMU backing files
    - **Network Isolation**: Per-pipeline VLAN + CIDR allocation with firewall rules
    - **Multi-Platform Runners**: GitLab, GitHub, Jenkins, CircleCI, Drone support
    - **VM Pool Management**: Pre-allocated VMs with instant creation (~0.5s)
    - **Real-Time Updates**: WebSocket-based live streaming
  version: 1.0.0
  contact:
    name: Wesley Robbins
    email: wez@stsgym.com

servers:
  - url: http://localhost:8080/api
    description: Local development server
  - url: https://vimic2.stsgym.com/api
    description: Production server

tags:
  - name: Health
    description: Health check endpoints
  - name: Pipelines
    description: Pipeline management
  - name: Jobs
    description: Job management
  - name: Runners
    description: Runner management
  - name: Pools
    description: VM pool management
  - name: Networks
    description: Network management
  - name: Artifacts
    description: Artifact management
  - name: WebSocket
    description: Real-time streaming

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns the health status of the service. No authentication required.
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /pipelines:
    get:
      tags:
        - Pipelines
      summary: List all pipelines
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of pipelines
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineList'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Pipelines
      summary: Create a new pipeline
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PipelineCreate'
      responses:
        '201':
          description: Pipeline created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pipeline'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /pipelines/{id}:
    get:
      tags:
        - Pipelines
      summary: Get pipeline details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pipeline details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pipeline'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /pipelines/{id}/start:
    post:
      tags:
        - Pipelines
      summary: Start a pipeline
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pipeline started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pipeline'
        '404':
          $ref: '#/components/responses/NotFound'

  /pipelines/{id}/stop:
    post:
      tags:
        - Pipelines
      summary: Stop a pipeline
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pipeline stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pipeline'
        '404':
          $ref: '#/components/responses/NotFound'

  /pipelines/{id}/destroy:
    delete:
      tags:
        - Pipelines
      summary: Delete/destroy a pipeline
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pipeline destroyed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pipeline'
        '404':
          $ref: '#/components/responses/NotFound'

  /jobs:
    get:
      tags:
        - Jobs
      summary: List all jobs
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of jobs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobList'

  /jobs/{id}:
    get:
      tags:
        - Jobs
      summary: Get job details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '404':
          $ref: '#/components/responses/NotFound'

  /jobs/{id}/cancel:
    post:
      tags:
        - Jobs
      summary: Cancel a job
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'

  /jobs/{id}/retry:
    post:
      tags:
        - Jobs
      summary: Retry a failed job
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job requeued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'

  /runners:
    get:
      tags:
        - Runners
      summary: List all runners
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of runners
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunnerList'

    post:
      tags:
        - Runners
      summary: Register a new runner
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunnerCreate'
      responses:
        '201':
          description: Runner registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Runner'

  /runners/{id}:
    get:
      tags:
        - Runners
      summary: Get runner details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Runner details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Runner'

  /runners/{id}/start:
    post:
      tags:
        - Runners
      summary: Start a runner
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Runner started

  /runners/{id}/stop:
    post:
      tags:
        - Runners
      summary: Stop a runner
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Runner stopped

  /runners/{id}/destroy:
    delete:
      tags:
        - Runners
      summary: Deregister a runner
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Runner deregistered

  /pools:
    get:
      tags:
        - Pools
      summary: List all VM pools
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of pools
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolList'

    post:
      tags:
        - Pools
      summary: Create a new VM pool
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PoolCreate'
      responses:
        '201':
          description: Pool created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pool'

  /pools/{name}:
    get:
      tags:
        - Pools
      summary: Get pool details
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pool details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pool'

  /pools/{name}/vms:
    get:
      tags:
        - Pools
      summary: List VMs in a pool
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of VMs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMList'

  /pools/{name}/acquire:
    post:
      tags:
        - Pools
      summary: Acquire a VM from pool
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: VM acquired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VMAcquire'

  /pools/{name}/release:
    post:
      tags:
        - Pools
      summary: Release a VM back to pool
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                vm_id:
                  type: string
      responses:
        '200':
          description: VM released

  /networks:
    get:
      tags:
        - Networks
      summary: List all networks
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of networks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkList'

    post:
      tags:
        - Networks
      summary: Create a new network
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NetworkCreate'
      responses:
        '201':
          description: Network created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Network'

  /networks/{id}:
    get:
      tags:
        - Networks
      summary: Get network details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Network details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Network'

  /networks/{id}/destroy:
    delete:
      tags:
        - Networks
      summary: Delete a network
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Network deleted

  /artifacts:
    get:
      tags:
        - Artifacts
      summary: List all artifacts
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of artifacts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactList'

  /artifacts/{id}:
    get:
      tags:
        - Artifacts
      summary: Get artifact details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Artifact details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Artifact'

  /ws:
    get:
      tags:
        - WebSocket
      summary: WebSocket connection
      description: |
        Connect to WebSocket for real-time updates.
        
        **Authentication**: Pass token as query parameter:
        ```
        ws://localhost:8080/api/ws?token=<bearer_token>
        ```
        
        **Event Types**:
        - `pipeline.started`
        - `pipeline.stopped`
        - `pipeline.completed`
        - `job.started`
        - `job.completed`
        - `job.failed`
        - `runner.online`
        - `runner.offline`
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '101':
          description: Switching protocols
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: vimic2
        version:
          type: string
          example: 1.0.0

    Pipeline:
      type: object
      properties:
        id:
          type: string
          example: pipe_abc123
        name:
          type: string
          example: my-pipeline
        status:
          type: string
          enum: [created, running, stopped, completed, failed]
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/Job'
        created_at:
          type: string
          format: date-time

    PipelineList:
      type: object
      properties:
        pipelines:
          type: array
          items:
            $ref: '#/components/schemas/Pipeline'

    PipelineCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        config:
          type: object
          properties:
            stages:
              type: array
              items:
                type: string
            timeout:
              type: integer

    Job:
      type: object
      properties:
        id:
          type: string
        pipeline_id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [queued, running, completed, failed, cancelled]
        runner_id:
          type: string
        started_at:
          type: string
          format: date-time
        logs:
          type: string

    JobList:
      type: object
      properties:
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/Job'

    Runner:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [gitlab, github, jenkins, circleci, drone]
        name:
          type: string
        status:
          type: string
          enum: [online, offline, starting, stopping]
        platform:
          type: string
          example: linux/amd64
        current_job:
          type: string
        labels:
          type: array
          items:
            type: string

    RunnerList:
      type: object
      properties:
        runners:
          type: array
          items:
            $ref: '#/components/schemas/Runner'

    RunnerCreate:
      type: object
      required:
        - type
        - name
        - platform
      properties:
        type:
          type: string
          enum: [gitlab, github, jenkins, circleci, drone]
        name:
          type: string
        platform:
          type: string
        labels:
          type: array
          items:
            type: string

    Pool:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
        available:
          type: integer
        platform:
          type: string
        memory:
          type: integer
        cpus:
          type: integer
        vm_template:
          type: string

    PoolList:
      type: object
      properties:
        pools:
          type: array
          items:
            $ref: '#/components/schemas/Pool'

    PoolCreate:
      type: object
      required:
        - name
        - size
        - platform
      properties:
        name:
          type: string
        size:
          type: integer
        platform:
          type: string
        memory:
          type: integer
        cpus:
          type: integer
        vm_template:
          type: string
        disk_size:
          type: integer

    VM:
      type: object
      properties:
        id:
          type: string
        pool:
          type: string
        status:
          type: string
          enum: [available, acquired, running, stopped]
        ip:
          type: string
        mac:
          type: string

    VMList:
      type: object
      properties:
        vms:
          type: array
          items:
            $ref: '#/components/schemas/VM'

    VMAcquire:
      type: object
      properties:
        vm_id:
          type: string
        ip:
          type: string
        mac:
          type: string

    Network:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        vlan:
          type: integer
        cidr:
          type: string
        gateway:
          type: string
        dns:
          type: array
          items:
            type: string
        firewall_rules:
          type: array
          items:
            $ref: '#/components/schemas/FirewallRule'

    NetworkList:
      type: object
      properties:
        networks:
          type: array
          items:
            $ref: '#/components/schemas/Network'

    NetworkCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        vlan:
          type: integer
        cidr:
          type: string
        gateway:
          type: string

    FirewallRule:
      type: object
      properties:
        action:
          type: string
          enum: [allow, deny]
        src:
          type: string
        dst:
          type: string
        ports:
          type: string
        direction:
          type: string
          enum: [inbound, outbound]

    Artifact:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        size:
          type: integer
        checksum:
          type: string
        url:
          type: string
        created_at:
          type: string
          format: date-time

    ArtifactList:
      type: object
      properties:
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/Artifact'

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: bad_request
            message: Invalid input

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: unauthorized
            message: Invalid or missing token

    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: not_found
            message: Resource not found

    InternalError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: internal_error
            message: Internal server error
