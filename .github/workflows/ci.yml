name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils libvirt-dev
      
      - name: Build
        run: go build -v ./cmd/vimic2
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: vimic2-linux
          path: vimic2

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      
      - name: Run tests
        run: go test -v -short ./...
      
      - name: Run tests with coverage
        run: go test -coverprofile=coverage.out ./...
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: ./...

  cross-compile:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      
      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o vimic2-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/vimic2
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: vimic2-${{ matrix.goos }}-${{ matrix.goarch }}
          path: vimic2-${{ matrix.goos }}-${{ matrix.goarch }}

  demo-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Start demo server
        run: |
          python3 vimic2-demo-server-full.py 8080 &
          sleep 5
          
      - name: Test API endpoints
        run: |
          curl -sf http://localhost:8080/api/health || exit 1
          curl -sf http://localhost:8080/api/stats || exit 1
          curl -sf http://localhost:8080/api/pipelines || exit 1
          curl -sf http://localhost:8080/api/pools || exit 1
          curl -sf http://localhost:8080/api/runners || exit 1
          echo "All endpoints healthy"