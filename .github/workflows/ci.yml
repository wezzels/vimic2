name: Vimic2 CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  GO_VERSION: '1.23'
  BINARY_NAME: 'vimic2'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run go fmt
        run: |
          cd vimic2
          go fmt ./...
          if [ -n "$(go fmt -l ./...)" ]; then
            echo "Code is not formatted"
            exit 1
          fi

      - name: Run go vet
        run: |
          cd vimic2
          go vet ./...

      - name: Check go mod
        run: |
          cd vimic2
          go mod verify
          go mod tidy
          if [ -n "$(git diff go.mod go.sum)" ]; then
            echo "go.mod/go.sum need updating"
            exit 1
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: |
          cd vimic2
          go test -tags '!libvirt' -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: vimic2/coverage.out
          flags: unittests
          name: vimic2-coverage

  test-network:
    name: Test Network Stack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run network tests
        run: |
          cd vimic2
          go test -tags '!libvirt' -v ./internal/network/...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            output: vimic2-linux-amd64
          - os: linux
            arch: arm64
            output: vimic2-linux-arm64
          - os: windows
            arch: amd64
            output: vimic2-windows-amd64.exe
          - os: darwin
            arch: amd64
            output: vimic2-darwin-amd64
          - os: darwin
            arch: arm64
            output: vimic2-darwin-arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          cd vimic2
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.1.0")
          go build -ldflags "-s -w -X main.version=${VERSION}" -o build/${{ matrix.output }} ./cmd/vimic2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: vimic2/build/${{ matrix.output }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: ./...
        continue-on-error: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'vimic2'
          format: 'table'
          exit-code: '0'
        continue-on-error: true

  release:
    name: Release
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Display structure
        run: ls -laR release

      - name: Create checksums
        run: |
          cd release
          sha256sum */vimic2-* > SHA256SUMS
          cat SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/*/vimic2-*
            release/SHA256SUMS
          generate_release_notes: true
          body: |
            # Vimic2 ${{ github.ref_name }}
            
            ## Release Artifacts
            
            | Platform | Architecture | Binary |
            |----------|-------------|--------|
            | Linux | amd64 | vimic2-linux-amd64 |
            | Linux | arm64 | vimic2-linux-arm64 |
            | Windows | amd64 | vimic2-windows-amd64.exe |
            | macOS | amd64 | vimic2-darwin-amd64 |
            | macOS | arm64 | vimic2-darwin-arm64 |
            
            ## Installation
            
            ```bash
            # Linux
            wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/vimic2-linux-amd64
            chmod +x vimic2-linux-amd64
            ./vimic2-linux-amd64
            ```
            
            ## Features
            
            - Network stack with OVS support
            - VXLAN/GRE/Geneve tunnels
            - Virtual routers with NAT
            - Firewall rules
            - Topology visualization
            - 49 tests, 33.4% coverage

  notify:
    name: Notify
    needs: [build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send notification
        run: |
          echo "Build status: ${{ needs.build.result }}"
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ Build succeeded"
          else
            echo "❌ Build failed"
          fi