# GitLab CI/CD Pipeline for Vimic2
# Runner: trooper2 (shell executor)

stages:
  - lint
  - test
  - build
  - security
  - release

variables:
  GIT_DEPTH: 0
  GO_VERSION: "1.23"
  BINARY_NAME: "vimic2"

lint-go:
  stage: lint
  tags:
    - trooper2
  script:
    - echo "=== Linting Go code ==="
    - go fmt ./...
    - go vet ./...
  only:
    - main
    - merge_requests

lint-mod:
  stage: lint
  tags:
    - trooper2
  script:
    - echo "=== Checking go.mod ==="
    - go mod verify
    - go mod tidy
  only:
    - main
    - merge_requests

test-unit:
  stage: test
  tags:
    - trooper2
  script:
    - echo "=== Running unit tests ==="
    - go test -tags "!libvirt" -v -race -coverprofile=coverage.out -skip "TestReal|TestWebSocketHub_UnregisterRun" ./...
    - go tool cover -func=coverage.out | tail -1
  only:
    - main
    - merge_requests

test-network:
  stage: test
  tags:
    - trooper2
  script:
    - echo "=== Running network tests ==="
    - go test -tags "!libvirt" -v ./internal/network/...
  only:
    - main
    - merge_requests

test-integration:
  stage: test
  tags:
    - trooper2
  script:
    - echo "=== Running integration tests ==="
    - go test -tags "!libvirt" -v -count=1 -skip "TestReal" ./...
  only:
    - main
    - merge_requests

build-linux:
  stage: build
  tags:
    - trooper2
  script:
    - echo "=== Building for current platform ==="
    - make build
    - ls -lh build/
  artifacts:
    paths:
      - build/vimic2
    expire_in: 1 week
  only:
    - main
    - tags

build-all:
  stage: build
  tags:
    - trooper2
  script:
    - echo "=== Building all platforms ==="
    - make build-all
    - ls -lh build/
  artifacts:
    paths:
      - build/vimic2-*
      - build/SHA256SUMS
    expire_in: 1 month
  only:
    - tags

security-gosec:
  stage: security
  tags:
    - trooper2
  script:
    - echo "=== Running security scan ==="
    - gosec -fmt sonarqube -out gosec-report.json ./... || echo "gosec not installed or failed"
  allow_failure: true
  only:
    - main
    - merge_requests

security-dependencies:
  stage: security
  tags:
    - trooper2
  script:
    - echo "=== Checking dependencies ==="
    - go list -m all
    - go mod graph
  only:
    - main
    - merge_requests

release-tag:
  stage: release
  tags:
    - trooper2
  script:
    - echo "=== Creating release ==="
    - make build-all
    - ls -lh build/
  artifacts:
    paths:
      - build/vimic2-*
      - build/SHA256SUMS
    expire_in: 6 months
  only:
    - tags

notify-success:
  stage: .post
  tags:
    - trooper2
  script:
    - echo "Pipeline completed successfully"
  when: on_success
  only:
    - main
    - tags

notify-failure:
  stage: .post
  tags:
    - trooper2
  script:
    - echo "Pipeline failed"
  when: on_failure
  only:
    - main
    - tags